# On-Prem → SPO — topic definitions

Agent: **On-Prem SharePoint → SPO Migration Guide** (bot `47c062aa-e264-f111-a826-000d3a5a0da1`)

---

## 1. Conversation Start

Paste into the existing "Conversation Start" system topic.

```yaml
kind: AdaptiveDialog
beginDialog:
  kind: OnConversationStart
  id: main
  actions:
    - kind: SendActivity
      id: introMsg
      activity: |-
        🏢 **On-Prem → SPO Migration Specialist**

        I cover the 2024 playbook: on-prem SharePoint Server / OneDrive (MySites)
        into SharePoint Online or SPO OneDrive. Which sub-scenario are you on?
    - kind: Question
      id: qSubFlow
      alwaysPrompt: false
      variable: Global.SubFlow
      prompt: "Pick your path:"
      entity:
        kind: ClosedListEntity
        items:
          - id: OD
            displayName: 🧑 On-prem MySites → SPO OneDrive (OD2OD)
          - id: Site
            displayName: 🌐 On-prem SP sites → SPO sites (SP2SPO)
          - id: Explain
            displayName: 🤔 Not sure — explain the difference
    - kind: ConditionGroup
      id: routeSub
      conditions:
        - id: cOD
          condition: =Global.SubFlow = "OD"
          actions:
            - kind: BeginDialog
              id: goOD
              dialog: topic.OD2ODOverview
        - id: cSite
          condition: =Global.SubFlow = "Site"
          actions:
            - kind: BeginDialog
              id: goSite
              dialog: topic.SP2SPOOverview
        - id: cExplain
          condition: =Global.SubFlow = "Explain"
          actions:
            - kind: BeginDialog
              id: goExplain
              dialog: topic.SubFlowExplainer
```

