## 2. OD2OD Overview

```yaml
kind: AdaptiveDialog
beginDialog:
  kind: OnRecognizedIntent
  id: main
  intent:
    triggerQueries:
      - OD2OD
      - mysite
      - my site
      - personal site
      - on-prem onedrive
      - /my/
  actions:
    - kind: SendActivity
      id: od2odMsg
      activity: |-
        **Flow A: On-Prem MySite → SPO OneDrive**

        - Script: `Migration-OD2OD-SPO(09132024).ps1`
        - Driver list: `OneDriveMigrationStatus`
        - Source pattern: `https://onedrive.<on-prem>/my/<sam>`
        - Target pattern: `https://<tenant>-my.<spo-endpoint>/personal/<upn>`

        Ask me for the **workflow diagram**, the **prereq checklist**, a **sample
        command line**, the **column names**, **throughput**, the **SCA swap**,
        **AD updates**, or **notifications** — I'll pull it from my knowledge base.
```

