## 4. Sub-Flow Explainer

```yaml
kind: AdaptiveDialog
beginDialog:
  kind: OnRecognizedIntent
  id: main
  intent:
    triggerQueries:
      - what's the difference
      - explain
      - compare flows
  actions:
    - kind: SendActivity
      id: explainMsg
      activity: |-
        Two sub-flows, picked by **what** you're moving:

        | | OD2OD | SP2SPO |
        |---|---|---|
        | Source | On-prem MySites (personal) | On-prem team sites |
        | Target | SPO OneDrive | SPO sites |
        | Driver list | `OneDriveMigrationStatus` | `SPOMigrationStatus` |

        Which one are you on — **personal MySites** or **team sites**?
    - kind: Question
      id: qPick
      alwaysPrompt: true
      variable: Global.SubFlow
      prompt: "Personal MySites or team sites?"
      entity:
        kind: ClosedListEntity
        items:
          - id: OD
            displayName: Personal MySites (OD2OD)
          - id: Site
            displayName: Team sites (SP2SPO)
    - kind: ConditionGroup
      id: routePick
      conditions:
        - id: pOD
          condition: =Global.SubFlow = "OD"
          actions:
            - kind: BeginDialog
              id: goOD2
              dialog: topic.OD2ODOverview
        - id: pSite
          condition: =Global.SubFlow = "Site"
          actions:
            - kind: BeginDialog
              id: goSite2
              dialog: topic.SP2SPOOverview
```

