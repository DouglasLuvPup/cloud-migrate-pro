## 4. Why these scripts vs third-party (Positioning)

```yaml
kind: AdaptiveDialog
beginDialog:
  kind: OnRecognizedIntent
  id: main
  intent:
    triggerQueries:
      - why this
      - why not ShareGate
      - ShareGate
      - AvePoint
      - Quest
      - BitTitan
      - Migration Manager
      - SPMT
      - compare tools
      - why custom
      - buy vs build
      - which migration tool
  actions:
    - kind: SendActivity
      id: posMsg
      activity: |-
        Short answer: **cost, sovereign-cloud coverage, and federal-specific
        identity glue that no off-the-shelf tool ships with.**

        1. **Runs in IL5 and IL6 today** — the same code ships to commercial,
           GCC-H/IL5, and IL6 with only an endpoint suffix swap.
        2. **$0 licensing** — built on free Microsoft SPMT; the orchestration
           layer is owned IP.
        3. **Federal-specific identity workflow** (AD home-page flip, redirection
           group cleanup, license group swap, conditional admin grants) that
           commercial tools don't include.
        4. **No vendor cloud in the data path** — source → your infrastructure →
           Microsoft 365. Nothing routes through a third-party cloud.

        Want the detailed tool-by-tool comparison? Ask me about a specific tool
        (ShareGate, AvePoint, Quest, BitTitan) and I'll pull the specifics from
        my knowledge base.

        > Any dollar figures are industry estimates — confirm with a live vendor
        > quote before any customer-facing claim.
```

