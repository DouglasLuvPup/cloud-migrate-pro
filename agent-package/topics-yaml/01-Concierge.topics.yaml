## 2. About the Concierge

```yaml
kind: AdaptiveDialog
beginDialog:
  kind: OnRecognizedIntent
  id: main
  intent:
    triggerQueries:
      - what can you do
      - what is this
      - about
      - help
      - who built this
  actions:
    - kind: SendActivity
      id: aboutMsg
      activity: |-
        I'm a router, not a doer. I connect you to one of three specialist
        migration guides — each grounded only in the scripts for that scenario,
        so you never get cross-wired advice.

        | Playbook | What it moves | Where it goes |
        |---|---|---|
        | 🏢 On-Prem → SPO | On-prem SharePoint sites / home sites | SharePoint Online / OneDrive |
        | 🏠 H: Drive → OneDrive | Your personal network home drive | Your OneDrive |
        | 📁 Common Drive → SPO | A shared team drive | Teams channel or SharePoint site |

        **What I won't do:** mix scenarios, invent settings, or run anything for
        you. You drive — I navigate. Which one sounds like your move?
```

