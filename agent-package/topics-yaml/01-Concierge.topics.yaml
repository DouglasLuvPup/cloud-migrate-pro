## 1. Conversation Start — welcome adaptive card

Paste into the **existing** "Conversation Start" system topic (edit it, open code editor).

```yaml
kind: AdaptiveDialog
beginDialog:
  kind: OnConversationStart
  id: main
  actions:
    - kind: SendActivity
      id: sendWelcomeCard
      activity:
        attachments:
          - kind: AdaptiveCardTemplate
            cardContent: |-
              {
                "type": "AdaptiveCard",
                "$schema": "http://adaptivecards.io/schemas/adaptive-card.json",
                "version": "1.5",
                "body": [
                  {
                    "type": "Container",
                    "style": "emphasis",
                    "bleed": true,
                    "items": [
                      { "type": "TextBlock", "text": "Cloud Migrate Pro Concierge", "size": "ExtraLarge", "weight": "Bolder", "color": "Accent", "wrap": true },
                      { "type": "TextBlock", "text": "Three playbooks. One front door.", "isSubtle": true, "spacing": "None", "wrap": true }
                    ]
                  },
                  { "type": "TextBlock", "text": "I route you to the right specialist for your scenario — no cross-wired advice, no invented settings. Pick your scenario:", "wrap": true, "spacing": "Medium" },
                  {
                    "type": "ColumnSet",
                    "columns": [
                      { "type": "Column", "width": "stretch", "style": "good", "items": [ { "type": "TextBlock", "text": "🏢 On-Prem → SPO", "weight": "Bolder", "wrap": true }, { "type": "TextBlock", "text": "On-prem SharePoint sites or home sites → Microsoft 365", "size": "Small", "isSubtle": true, "wrap": true } ], "selectAction": { "type": "Action.Submit", "title": "On-Prem", "data": { "choice": "OnPrem" } } },
                      { "type": "Column", "width": "stretch", "style": "warning", "items": [ { "type": "TextBlock", "text": "🏠 H: Drive → OneDrive", "weight": "Bolder", "wrap": true }, { "type": "TextBlock", "text": "Personal network home drive → your OneDrive", "size": "Small", "isSubtle": true, "wrap": true } ], "selectAction": { "type": "Action.Submit", "title": "H: Drive", "data": { "choice": "HDrive" } } },
                      { "type": "Column", "width": "stretch", "style": "accent", "items": [ { "type": "TextBlock", "text": "📁 Common Drive → SPO", "weight": "Bolder", "wrap": true }, { "type": "TextBlock", "text": "Shared team drive → Teams channel or SharePoint site", "size": "Small", "isSubtle": true, "wrap": true } ], "selectAction": { "type": "Action.Submit", "title": "Common Drive", "data": { "choice": "CommonDrive" } } }
                    ]
                  },
                  { "type": "TextBlock", "text": "Not sure which one?", "spacing": "Medium", "weight": "Bolder" }
                ],
                "actions": [
                  { "type": "Action.Submit", "title": "🤔 Help me decide", "data": { "choice": "Decide" } },
                  { "type": "Action.Submit", "title": "ℹ️ About this agent", "data": { "choice": "About" } }
                ]
              }
    - kind: Question
      id: question_choice
      alwaysPrompt: false
      variable: Topic.UserChoice
      prompt:
        text:
          - ""
      entity:
        kind: ClosedListEntity
        items:
          - id: OnPrem
            displayName: OnPrem
          - id: HDrive
            displayName: HDrive
          - id: CommonDrive
            displayName: CommonDrive
          - id: Decide
            displayName: Decide
          - id: About
            displayName: About
    - kind: ConditionGroup
      id: route
      conditions:
        - id: cOnPrem
          condition: =Topic.UserChoice = "OnPrem"
          actions:
            - kind: SendActivity
              id: hOnPrem
              activity: "🏢 Routing you to the On-Prem → SPO specialist now."
        - id: cHDrive
          condition: =Topic.UserChoice = "HDrive"
          actions:
            - kind: SendActivity
              id: hHDrive
              activity: "🏠 Routing you to the H: Drive → OneDrive specialist now."
        - id: cCommon
          condition: =Topic.UserChoice = "CommonDrive"
          actions:
            - kind: SendActivity
              id: hCommon
              activity: "📁 Routing you to the Common Drive specialist now."
        - id: cDecide
          condition: =Topic.UserChoice = "Decide"
          actions:
            - kind: BeginDialog
              id: goDecide
              dialog: topic.HelpMeDecide
        - id: cAbout
          condition: =Topic.UserChoice = "About"
          actions:
            - kind: BeginDialog
              id: goAbout
              dialog: topic.AboutTheConcierge
```

> With generative orchestration ON, the three "Routing you to…" branches hand off
> automatically to the connected specialist. The messages just set expectations.

