## 3. Help Me Decide

```yaml
kind: AdaptiveDialog
beginDialog:
  kind: OnRecognizedIntent
  id: main
  intent:
    triggerQueries:
      - help me decide
      - not sure
      - I don't know which one
      - pick one for me
  actions:
    - kind: Question
      id: qSource
      alwaysPrompt: true
      variable: Topic.Source
      prompt: "Where do the files live today?"
      entity:
        kind: ClosedListEntity
        items:
          - id: OnPrem
            displayName: On a SharePoint server we host
          - id: HDrive
            displayName: In a personal home folder on a file server
          - id: CommonDrive
            displayName: In a shared/common folder on a file server
          - id: Unknown
            displayName: Something else
    - kind: ConditionGroup
      id: decide
      conditions:
        - id: dOnPrem
          condition: =Topic.Source = "OnPrem"
          actions:
            - kind: SendActivity
              id: rOnPrem
              activity: "Sounds like the **On-Prem → SPO** playbook. Handing you to that specialist now."
        - id: dHDrive
          condition: =Topic.Source = "HDrive"
          actions:
            - kind: SendActivity
              id: rHDrive
              activity: "Sounds like the **H: Drive → OneDrive** playbook. Handing you over now."
        - id: dCommon
          condition: =Topic.Source = "CommonDrive"
          actions:
            - kind: SendActivity
              id: rCommon
              activity: "Sounds like the **Common Drive → SPO** playbook. Handing you over now."
      elseActions:
        - kind: SendActivity
          id: rUnknown
          activity: "That sounds out of scope for these three playbooks — best to check with the migration team."
```

