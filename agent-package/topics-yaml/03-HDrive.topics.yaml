## 1. Conversation Start

Paste into the existing "Conversation Start" system topic.

```yaml
kind: AdaptiveDialog
beginDialog:
  kind: OnConversationStart
  id: main
  actions:
    - kind: SendActivity
      id: introMsg
      activity: |-
        🏠 **H: Drive → OneDrive Migration Specialist**

        I cover the 2025 playbook: your personal network home drive
        (`\\server\users\<you>`) into your OneDrive under `/Documents/HDrive`.
    - kind: Question
      id: qPath
      alwaysPrompt: false
      variable: Topic.Choice
      prompt: "Pick a path:"
      entity:
        kind: ClosedListEntity
        items:
          - id: Workflow
            displayName: Workflow diagram
          - id: Prereqs
            displayName: What I need first
          - id: Sample
            displayName: Sample command
          - id: Errors
            displayName: Errors & retry
          - id: SCA
            displayName: Admin-access cleanup
          - id: Status
            displayName: Status values
          - id: Back
            displayName: Back to Concierge
    - kind: ConditionGroup
      id: route
      conditions:
        - id: cBack
          condition: =Topic.Choice = "Back"
          actions:
            - kind: SendActivity
              id: backMsg
              activity: "No problem — head back to the **Concierge** and it'll route you wherever you need."
      elseActions:
        - kind: SendActivity
          id: askMsg
          activity: "Great — ask me about that and I'll pull the details from my knowledge base (diagrams, prereqs, sample commands, errors, admin-access cleanup, and status values are all covered)."
```

