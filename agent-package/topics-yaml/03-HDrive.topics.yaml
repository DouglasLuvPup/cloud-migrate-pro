## 2. Credentials / SPMTCred.xml

```yaml
kind: AdaptiveDialog
beginDialog:
  kind: OnRecognizedIntent
  id: main
  intent:
    triggerQueries:
      - credential
      - password
      - SPMTCred
      - re-prompt
      - login
  actions:
    - kind: SendActivity
      id: credMsg
      activity: |-
        The script caches your Microsoft 365 sign-in at:
        `%USERPROFILE%\SPMTCred.xml`

        To force a fresh sign-in, delete that file:
        `Remove-Item $env:USERPROFILE\SPMTCred.xml`

        It's protected so only your account on that machine can read it — don't
        copy it to other machines.
```

