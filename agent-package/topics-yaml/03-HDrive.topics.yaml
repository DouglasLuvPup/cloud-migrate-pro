## 3. Admin-access (SCA) claims

```yaml
kind: AdaptiveDialog
beginDialog:
  kind: OnRecognizedIntent
  id: main
  intent:
    triggerQueries:
      - SCA
      - site collection admin
      - claim
      - SpecialGroup
      - admin access
  actions:
    - kind: SendActivity
      id: scaMsg
      activity: |-
        To copy your files in, the script temporarily grants admin access to your
        OneDrive:

        - **Always** adds the OneDrive admin group.
        - Adds the tenant-admin group **only** when the row's `SpecialGroup`
          column is `Yes`.

        Important: the script does **not** remove this access afterward — it
        stays on your OneDrive. If your governance requires removal, that's a
        manual cleanup step. Ask me for the exact command.
```

---

## 4. Status values

```yaml
kind: AdaptiveDialog
beginDialog:
  kind: OnRecognizedIntent
  id: main
  intent:
    triggerQueries:
      - status
      - Migrate column
      - what does ErrorLog mean
      - ManualLog
      - state values
  actions:
    - kind: SendActivity
      id: statusMsg
      activity: |-
        The `Migrate` column tells you where a user is in the move:

        - **Ready** – queued, not started
        - **Processing** – currently running
        - **Migrated** – done successfully
        - **Failed** – clears `Processing` so it can be retried
        - **ErrorLog / ManualLog** – stopped with an issue; these leave
          `Processing` set and need a look before retrying

        Want the full breakdown? Ask me and I'll pull it from the knowledge base.
```

