# Common Drive → Teams/SPO — topic definitions

Agent: **Common Drive → Teams/SharePoint Migration** (bot `32433b33-e564-f111-a826-000d3a5a0da1`)

---

## 1. Conversation Start

Paste into the existing "Conversation Start" system topic.

```yaml
kind: AdaptiveDialog
beginDialog:
  kind: OnConversationStart
  id: main
  actions:
    - kind: SendActivity
      id: introMsg
      activity: |-
        📁 **Common Drive → SPO Migration Specialist**

        I cover the 2026 playbook: a shared team/department drive into Microsoft
        365 — either as a **Microsoft Teams channel folder**, or directly into a
        **SharePoint site**. Which target are you on?
    - kind: Question
      id: qFlow
      alwaysPrompt: false
      variable: Global.CDFlow
      prompt: "Pick your target:"
      entity:
        kind: ClosedListEntity
        items:
          - id: Channel
            displayName: 🟪 Teams channel folder
          - id: SiteOnly
            displayName: 🟦 SharePoint site (no Team)
          - id: Compare
            displayName: 🤔 Compare the two
    - kind: ConditionGroup
      id: routeFlow
      conditions:
        - id: cChannel
          condition: =Global.CDFlow = "Channel"
          actions:
            - kind: BeginDialog
              id: goA
              dialog: topic.FlowAOverview
        - id: cSite
          condition: =Global.CDFlow = "SiteOnly"
          actions:
            - kind: BeginDialog
              id: goB
              dialog: topic.FlowBOverview
        - id: cCompare
          condition: =Global.CDFlow = "Compare"
          actions:
            - kind: BeginDialog
              id: goCmp
              dialog: topic.FlowComparison
```

