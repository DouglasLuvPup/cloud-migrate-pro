## 3. Flow B Overview (SharePoint site only)

```yaml
kind: AdaptiveDialog
beginDialog:
  kind: OnRecognizedIntent
  id: main
  intent:
    triggerQueries:
      - spo site
      - site only
      - no team
      - direct to site
      - no channel
  actions:
    - kind: SendActivity
      id: flowBMsg
      activity: |-
        **Flow B: shared drive → SharePoint site (no Team)**

        Same pipeline as Flow A, but the Team/channel setup step is **skipped**
        — there's no Team to resolve. The storage check and service-account
        access grant still run, then staging, scheduling, and the copy are
        identical to Flow A.

        Ask me about the **workflow**, **prereqs**, a **sample call**, the **list
        columns**, **migration states**, **scheduling**, or **scale** — I'll pull
        it from my knowledge base.
```

