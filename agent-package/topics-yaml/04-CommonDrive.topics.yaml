## 4. Flow Comparison

```yaml
kind: AdaptiveDialog
beginDialog:
  kind: OnRecognizedIntent
  id: main
  intent:
    triggerQueries:
      - compare
      - difference
      - which flow
      - teams or sharepoint
  actions:
    - kind: SendActivity
      id: cmpMsg
      activity: |-
        | | 🟪 Teams channel | 🟦 SharePoint site |
        |---|---|---|
        | Best when | The team already works in Teams | People browse to a document library |
        | Setup | Resolves Team + channel, auto-creates the folder | Goes straight to the site |
        | Result | Files land in a Teams channel's Files tab | Files land in a SharePoint library |

        Not sure? Tell me how your team works day-to-day and I'll recommend one.
    - kind: Question
      id: qPick
      alwaysPrompt: true
      variable: Global.CDFlow
      prompt: "Which target fits?"
      entity:
        kind: ClosedListEntity
        items:
          - id: Channel
            displayName: Teams channel folder
          - id: SiteOnly
            displayName: SharePoint site
    - kind: ConditionGroup
      id: routePick
      conditions:
        - id: pChannel
          condition: =Global.CDFlow = "Channel"
          actions:
            - kind: BeginDialog
              id: goA2
              dialog: topic.FlowAOverview
        - id: pSite
          condition: =Global.CDFlow = "SiteOnly"
          actions:
            - kind: BeginDialog
              id: goB2
              dialog: topic.FlowBOverview
```

