## 2. Flow A Overview (Teams channel)

```yaml
kind: AdaptiveDialog
beginDialog:
  kind: OnRecognizedIntent
  id: main
  intent:
    triggerQueries:
      - teams channel
      - channel folder
      - team site
      - microsoft teams
  actions:
    - kind: SendActivity
      id: flowAMsg
      activity: |-
        **Flow A: shared drive → Teams channel folder**

        The pipeline resolves your Team and channel, auto-creates the channel
        folder, grants the service account access, scans the source, runs the
        copy with SPMT, then builds a status dashboard and a landing page.

        Ask me about the **workflow**, **prereqs**, a **sample call**, the **list
        columns**, **migration states**, **scheduling**, **storage downgrade**,
        the **two-phase setup**, **advanced parameters**, **errors**, or **scale**
        — I'll answer from my knowledge base.
```

