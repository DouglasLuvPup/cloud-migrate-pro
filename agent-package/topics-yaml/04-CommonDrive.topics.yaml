## 5. Scheduling

```yaml
kind: AdaptiveDialog
beginDialog:
  kind: OnRecognizedIntent
  id: main
  intent:
    triggerQueries:
      - scheduling
      - time zone
      - after hours
      - weekend
      - holiday
      - migration window
      - priority
  actions:
    - kind: SendActivity
      id: schedMsg
      activity: |-
        With scheduling on, moves run inside safe windows:

        - **Weekdays** 5pm–6am (in the row's time zone)
        - **Weekends** and **U.S. federal holidays** — any time
        - Mark a row **ExtendedHours = Yes** to bypass the window
        - Large jobs (≥ 10 GB) run weekends/holidays only unless ExtendedHours
        - **Priority 1** runs first; ties break in first-queued order

        Want time-zone codes or the exact switches? Ask and I'll pull them.
```

